worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream user_service {
        server user-service:8000;
    }

    upstream deck_service {
        server deck-service:8001;
    }

    upstream quiz_service {
        server quiz-service:8002;
    }

    upstream frontend {
        server frontend:5173;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10M;

        # ── Auth routes → User Service ────────────────────────────────────────
        location /auth/ {
            proxy_pass         http://user_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── User routes → User Service ────────────────────────────────────────
        location /users/ {
            proxy_pass         http://user_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Deck routes → Deck Service ────────────────────────────────────────
        location /decks/ {
            proxy_pass         http://deck_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Session REST routes → Quiz Session Service ────────────────────────
        location /sessions/ {
            proxy_pass         http://quiz_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── WebSocket routes → Quiz Session Service ───────────────────────────
        location /ws/ {
            proxy_pass             http://quiz_service;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade           $http_upgrade;
            proxy_set_header       Connection        "upgrade";
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        # ── Frontend (catch-all) ──────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Vite HMR WebSocket
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
